{% extends "base/auth_base.html" %}

{% block title %}Leader Login - CAMS{% endblock %}

{% block auth_content %}
<h2 class="auth-form-title">Club Leader</h2>
<div class="auth-form-subtitle">Welcome back! Please login to your account. <i class="fas fa-crown ms-1 text-warning"></i></div>

<form method="POST" action="{{ url_for('club_leader.login') }}">
    <input type="email" autocomplete="off"
           class="form-control" 
           id="email" 
           name="email" 
           placeholder="Email Address" 
           required>

    <input type="password" 
           class="form-control" 
           id="password" 
           name="password" 
           placeholder="Password" 
           required>

    <button type="submit" class="btn-auth">Log In</button>
</form>

<div class="auth-links">
    <a href="{{ url_for('home') }}" class="d-inline-flex align-items-center mt-4">
        <i class="fas fa-arrow-left me-2"></i> Back to Portal
    </a>
</div>
{% endblock %}
