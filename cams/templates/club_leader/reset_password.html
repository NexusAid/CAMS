{% extends "base/auth_base.html" %}

{% block title %}Reset Password - CAMS Club Leader{% endblock %}

{% block auth_content %}
<h2 class="auth-form-title">Club Leader</h2>
<div class="auth-form-subtitle">Enter your new password. <i class="fas fa-lock ms-1 text-warning"></i></div>

<form method="POST" action="{{ url_for('club_leader.reset_password', token=token) }}">
    <input type="password" 
           class="form-control mb-3" 
           id="password" 
           name="password" 
           placeholder="New Password" 
           required>

    <button type="submit" class="btn-auth">Reset Password</button>
</form>
{% endblock %}
