{% extends "base/auth_base.html" %}

{% block title %}Forgot Password - CAMS Club Leader{% endblock %}

{% block auth_content %}
<h2 class="auth-form-title">Club Leader</h2>
<div class="auth-form-subtitle">Reset your password. <i class="fas fa-key ms-1 text-warning"></i></div>

<form method="POST" action="{{ url_for('club_leader.forgot_password') }}">
    <input type="email" autocomplete="off"
           class="form-control mb-3" 
           id="email" 
           name="email" 
           placeholder="Email Address" 
           required>

    <button type="submit" class="btn-auth">Send Reset Link</button>
</form>

<div class="auth-links mt-3 text-center">
    <a href="{{ url_for('club_leader.login') }}" class="text-decoration-none">Back to Login</a>
</div>
{% endblock %}
