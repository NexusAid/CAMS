{% extends "base/auth_base.html" %}

{% block title %}Student Registration - CAMS{% endblock %}

{% block auth_content %}
<h2 class="auth-form-title">Register</h2>
<div class="auth-form-subtitle">Create your CAMS account.</div>

<form method="POST" action="{{ url_for('student.register') }}">
    
    <div class="form-row">
        <div class="form-col">
            <input type="text" autocomplete="off"
               class="form-control" 
               name="first_name" 
               placeholder="First Name" 
               required>
        </div>
        <div class="form-col">
            <input type="text" autocomplete="off"
               class="form-control" 
               name="last_name" 
               placeholder="Last Name" 
               required>
        </div>
    </div>

    <input type="email" autocomplete="off"
           class="form-control" 
           name="email" 
           placeholder="Student Email" 
           required>

    <input type="text" autocomplete="off"
           class="form-control" 
           name="reg_no" 
           placeholder="Registration No. (e.g. S13/00000/22)" 
           pattern="^[A-Za-z]{1}[0-9]{2}/[0-9]{5}/[0-9]{2}$" 
           title="Format: S13/07803/22"
           required>

    <input type="text" autocomplete="off"
           class="form-control" 
           name="course" 
           placeholder="Course / Degree" 
           required>

    <div class="form-row">
        <div class="form-col">
            <input type="password" 
               class="form-control" 
               name="password" 
               placeholder="Password"
               minlength="6" 
               required>
        </div>
        <div class="form-col">
            <input type="password" 
               class="form-control" 
               name="confirm_password" 
               placeholder="Confirm" 
               required>
        </div>
    </div>

    <button type="submit" class="btn-auth">Create Account</button>
</form>

<div class="auth-links">
    <a href="{{ url_for('student.login') }}">Already have an account? Login</a>
</div>
{% endblock %}
