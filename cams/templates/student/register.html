{% extends "base/auth_base.html" %}

{% block title %}Student Registration - CAMS{% endblock %}

{% block auth_content %}
<h2 class="auth-form-title">Register</h2>
<div class="auth-form-subtitle">Create your CAMS account.</div>

<form method="POST" action="{{ url_for('student.register') }}">

    <div class="form-row">
        <div class="form-col">
            <div class="form-floating">
                <input type="text" autocomplete="off" class="form-control" id="first_name" name="first_name" placeholder="First Name" required>
                <label for="first_name">First Name</label>
            </div>
        </div>
        <div class="form-col">
            <div class="form-floating">
                <input type="text" autocomplete="off" class="form-control" id="last_name" name="last_name" placeholder="Last Name" required>
                <label for="last_name">Last Name</label>
            </div>
        </div>
    </div>

    <div class="form-floating">
        <input type="email" autocomplete="off" class="form-control" id="email" name="email" placeholder="Student Email" required>
        <label for="email">Student Email</label>
    </div>

    <div class="form-floating">
        <input type="text" autocomplete="off" class="form-control" id="reg_no" name="reg_no"
            placeholder="Registration No. (e.g. S13/00000/22)" pattern="^[A-Za-z]{1}[0-9]{2}/[0-9]{5}/[0-9]{2}$"
            title="Format: S13/07803/22" required>
        <label for="reg_no">Registration No. (e.g. S13/00000/22)</label>
    </div>

    <div class="form-floating">
        <input type="text" autocomplete="off" class="form-control" id="course" name="course" placeholder="Course / Degree" required>
        <label for="course">Course / Degree</label>
    </div>

    <div class="form-row">
        <div class="form-col">
            <div class="form-floating password-wrapper">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" minlength="6" required>
                <label for="password">Password</label>
                <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
            </div>
        </div>
        <div class="form-col">
            <div class="form-floating password-wrapper">
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                <label for="confirm_password">Confirm Password</label>
                <i class="fas fa-eye password-toggle" onclick="togglePassword('confirm_password', this)"></i>
            </div>
        </div>
    </div>

    <button type="submit" class="btn-auth">Create Account</button>
</form>

<div class="auth-links">
    <a href="{{ url_for('student.login') }}">Already have an account? Login</a>
</div>
{% endblock %}
