{% extends "base/auth_base.html" %}

{% block title %}Admin Login - CAMS{% endblock %}

{% block auth_content %}
<h2 class="auth-form-title">Welcome</h2>
<div class="auth-form-subtitle">Please login to admin dashboard.</div>

<form method="POST" action="{{ url_for('auth.login') }}">
    <input type="email" autocomplete="off"
           class="form-control" 
           id="email" 
           name="email" 
           placeholder="Email Address" 
           required>

    <input type="password" 
           class="form-control" 
           id="password" 
           name="password" 
           placeholder="Password" 
           required>

    <button type="submit" class="btn-auth">Login</button>
</form>

<div class="auth-links">
    <a href="{{ url_for('auth.forgot_password') }}">Forgotten your password?</a><br>
</div>
{% endblock %}
