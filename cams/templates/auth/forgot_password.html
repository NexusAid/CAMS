{% extends "base/auth_base.html" %}

{% block title %}Forgot Password - CAMS{% endblock %}

{% block auth_content %}
<h2 class="auth-form-title">Reset Access</h2>
<div class="auth-form-subtitle">Enter your email to receive a reset link.</div>

<form method="POST" action="{{ url_for('auth.forgot_password') }}">
    <input type="email" autocomplete="off"
           class="form-control" 
           id="email" 
           name="email" 
           placeholder="Admin Email Address" 
           required>

    <button type="submit" class="btn-auth">Send Reset Link</button>
</form>

<div class="auth-links">
    <a href="{{ url_for('auth.login') }}">Back to Login</a>
</div>
{% endblock %}
